name: DockerHub Main Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Docker Hub image name
        id: image
        shell: bash
        run: |
          IMAGE_NAME="ggranados1203/model-runner"
          echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "Publishing to $IMAGE_NAME"

      - name: Load versions
        id: versions
        shell: bash
        run: |
          echo "llama_server_version=$(grep '^LLAMA_SERVER_VERSION=' .versions | cut -d= -f2- | sed 's/[[:space:]]*#.*//;s/[[:space:]]*$//')" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate CPU image metadata
        id: meta_cpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: final-llamacpp
          platforms: linux/amd64
          build-args: |
            LLAMA_SERVER_VERSION=${{ steps.versions.outputs.llama_server_version }}
            VERSION=${{ github.sha }}
          push: true
          tags: ${{ steps.meta_cpu.outputs.tags }}
          labels: ${{ steps.meta_cpu.outputs.labels }}
          cache-from: type=gha,scope=main-cpu
          cache-to: type=gha,mode=max,scope=main-cpu

      - name: Validate published image
        shell: bash
